# ─── Redirect: digitrion.co → digitrion.com (301 permanente) ──────────────────
server {
    listen 80;
    server_name digitrion.co www.digitrion.co;
    return 301 https://digitrion.com$request_uri;
}

# ─── Sitio principal: digitrion.com ───────────────────────────────────────────
server {
    listen 80 default_server;
    server_name digitrion.com www.digitrion.com;
    root /usr/share/nginx/html;
    index index.html;

    # Redirigir www → sin www (canonical)
    if ($host = 'www.digitrion.com') {
        return 301 https://digitrion.com$request_uri;
    }

    # ─── Compresión ───────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/atom+xml image/svg+xml;

    # ─── Caché de fuentes e imágenes (casi nunca cambian) ──────────
    location ~* \.(woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ─── CSS/JS: caché corta, el navegador revalida en cada visita ─
    # (evita servir una versión vieja del sitio tras cada despliegue)
    location ~* \.(css|js)$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
        access_log off;
    }

    # ─── Headers de seguridad ─────────────────────────────────────
    add_header X-Frame-Options            "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options     "nosniff"                         always;
    add_header X-XSS-Protection           "1; mode=block"                   always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy
        "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';"
        always;

    server_tokens off;

    # ─── Rutas ────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    location = /privacidad { try_files /privacidad.html =404; }
    location = /terminos   { try_files /terminos.html =404; }

    # ─── Páginas de error ─────────────────────────────────────────
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    # ─── Bloquear archivos ocultos ────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
